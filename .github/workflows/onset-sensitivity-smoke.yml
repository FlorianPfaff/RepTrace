name: Onset Sensitivity Smoke Test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/reptrace/onset_detection.py"
      - "src/reptrace/onset_workflow.py"
      - "src/reptrace/onset_sensitivity.py"
      - "tests/test_onset_detection.py"
      - "tests/test_onset_workflow.py"
      - "tests/test_onset_sensitivity.py"
      - "docs/reference/onset-detection.md"
      - "docs/reference/onset-workflow.md"
      - "docs/reference/onset-sensitivity.md"
      - "docs/api-overview.md"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "poetry.lock"
      - ".github/workflows/onset-sensitivity-smoke.yml"
  pull_request:
    paths:
      - "src/reptrace/onset_detection.py"
      - "src/reptrace/onset_workflow.py"
      - "src/reptrace/onset_sensitivity.py"
      - "tests/test_onset_detection.py"
      - "tests/test_onset_workflow.py"
      - "tests/test_onset_sensitivity.py"
      - "docs/reference/onset-detection.md"
      - "docs/reference/onset-workflow.md"
      - "docs/reference/onset-sensitivity.md"
      - "docs/api-overview.md"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "poetry.lock"
      - ".github/workflows/onset-sensitivity-smoke.yml"

jobs:
  smoke:
    name: Onset sensitivity smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Install dependencies
        run: poetry install --with dev,docs

      - name: Run onset sensitivity tests
        run: |
          poetry run pytest \
            tests/test_onset_detection.py \
            tests/test_onset_workflow.py \
            tests/test_onset_sensitivity.py

      - name: Lint onset sensitivity modules
        run: |
          poetry run ruff check \
            src/reptrace/onset_detection.py \
            src/reptrace/onset_workflow.py \
            src/reptrace/onset_sensitivity.py \
            tests/test_onset_detection.py \
            tests/test_onset_workflow.py \
            tests/test_onset_sensitivity.py

      - name: Build docs
        run: poetry run mkdocs build --strict
