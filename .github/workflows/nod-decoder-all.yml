name: NOD decoder comparison

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      data_root:
        description: "Directory containing sub-*_epo.fif and sub-*_events.csv files"
        required: true
        default: "../data/nod"
      output_dir:
        description: "Repository-relative output directory for derived results"
        required: true
        default: "results/nod_animate_decoders_all"
      n_permutations:
        description: "Sign-flip permutations for temporal inference"
        required: true
        default: "10000"
      python_version:
        description: "Python version for the local py launcher"
        required: true
        default: "3.12"

concurrency:
  group: nod-decoder-comparison-${{ github.ref }}
  cancel-in-progress: false

jobs:
  nod-decoder-comparison:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 720

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install dependencies
        shell: cmd
        run: |
          py -${{ inputs.python_version }} --version
          py -${{ inputs.python_version }} -m pip install --upgrade pip
          py -${{ inputs.python_version }} -m pip install poetry
          for /f "delims=" %%P in ('py -${{ inputs.python_version }} -c "import sys; print(sys.executable)"') do set "PYTHON_EXE=%%P"
          py -${{ inputs.python_version }} -m poetry env use "%PYTHON_EXE%"
          py -${{ inputs.python_version }} -m poetry install

      - name: Prepare run manifest
        shell: cmd
        run: |
          set "DATA_ROOT=${{ inputs.data_root }}"
          if not exist "%DATA_ROOT%" if exist "%GITHUB_WORKSPACE%\%DATA_ROOT%" set "DATA_ROOT=%GITHUB_WORKSPACE%\%DATA_ROOT%"
          if not exist "%DATA_ROOT%" (
            echo Data root does not exist: %DATA_ROOT%
            exit /b 1
          )
          set "OUTPUT_DIR=%GITHUB_WORKSPACE%\${{ inputs.output_dir }}"
          set "RUN_MANIFEST=%OUTPUT_DIR%\manifest.csv"
          mkdir "%OUTPUT_DIR%" 2>nul
          py -${{ inputs.python_version }} -m poetry run python scripts\prepare_benchmark_manifest.py benchmarks\nod_animate_decoders_all.csv "%RUN_MANIFEST%" --data-root "%DATA_ROOT%"
          echo REPTRACE_DATA_ROOT=%DATA_ROOT%>>"%GITHUB_ENV%"
          echo REPTRACE_OUTPUT_DIR=%OUTPUT_DIR%>>"%GITHUB_ENV%"
          echo REPTRACE_RUN_MANIFEST=%RUN_MANIFEST%>>"%GITHUB_ENV%"
          echo Using data root: %DATA_ROOT%
          echo Wrote run manifest: %RUN_MANIFEST%

      - name: Validate staged data
        shell: cmd
        run: |
          set "PYTHONPATH=%GITHUB_WORKSPACE%\src"
          py -${{ inputs.python_version }} -m poetry run python -m reptrace.validate_manifest "%REPTRACE_RUN_MANIFEST%" --report-out "%REPTRACE_OUTPUT_DIR%\validation.csv"

      - name: Run all-subject decoder comparison
        shell: cmd
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          py -${{ inputs.python_version }} -m poetry run python -m reptrace.benchmark "%REPTRACE_RUN_MANIFEST%" --out-dir "%REPTRACE_OUTPUT_DIR%" --aggregate-out "%REPTRACE_OUTPUT_DIR%\summary.csv" --plot-out "%REPTRACE_OUTPUT_DIR%\summary.png" --calibration-dir "%REPTRACE_OUTPUT_DIR%\calibration" --chance 0.5

      - name: Generate reports and inference tables
        shell: cmd
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          py -${{ inputs.python_version }} -m poetry run python -m reptrace.report "%REPTRACE_OUTPUT_DIR%\summary.csv" "%REPTRACE_OUTPUT_DIR%\sub-*_time_decode.csv" --out "%REPTRACE_OUTPUT_DIR%\report.md" --chance 0.5
          py -${{ inputs.python_version }} -m poetry run python -m reptrace.calibration "%REPTRACE_OUTPUT_DIR%\summary.csv" "%REPTRACE_OUTPUT_DIR%\calibration\*_calibration_bins.csv" --out-report "%REPTRACE_OUTPUT_DIR%\calibration_report.md" --out-bins "%REPTRACE_OUTPUT_DIR%\reliability_bins.csv"
          py -${{ inputs.python_version }} -m poetry run python -m reptrace.plot_calibration "%REPTRACE_OUTPUT_DIR%\reliability_bins.csv" --out "%REPTRACE_OUTPUT_DIR%\reliability.png" --time-window 0.1 0.8 --title "NOD animate/inanimate decoder calibration"
          for %%D in (logistic lda linear_svm) do (
            py -${{ inputs.python_version }} -m poetry run python -m reptrace.inference "%REPTRACE_OUTPUT_DIR%\sub-*_%%D_time_decode.csv" --chance 0.5 --n-permutations "${{ inputs.n_permutations }}" --out-time "%REPTRACE_OUTPUT_DIR%\inference_%%D_time.csv" --out-clusters "%REPTRACE_OUTPUT_DIR%\inference_%%D_clusters.csv"
          )

      - name: Upload compact result artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: nod-animate-decoders-all-${{ github.run_id }}
          path: |
            ${{ inputs.output_dir }}/validation.csv
            ${{ inputs.output_dir }}/manifest.csv
            ${{ inputs.output_dir }}/summary.csv
            ${{ inputs.output_dir }}/summary.png
            ${{ inputs.output_dir }}/reliability.png
            ${{ inputs.output_dir }}/report.md
            ${{ inputs.output_dir }}/calibration_report.md
            ${{ inputs.output_dir }}/reliability_bins.csv
            ${{ inputs.output_dir }}/inference_*_time.csv
            ${{ inputs.output_dir }}/inference_*_clusters.csv
          if-no-files-found: warn
