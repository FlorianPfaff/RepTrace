name: NOD decoder comparison

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      data_root:
        description: "Directory containing sub-*_epo.fif and sub-*_events.csv files"
        required: true
        default: "../data/nod"
      output_dir:
        description: "Repository-relative output directory for derived results"
        required: true
        default: "results/nod_animate_decoders_all"
      n_permutations:
        description: "Sign-flip permutations for temporal inference"
        required: true
        default: "10000"
      python_version:
        description: "Python version for the benchmark environment"
        required: true
        default: "3.12"

concurrency:
  group: nod-decoder-comparison-${{ github.ref }}
  cancel-in-progress: false

jobs:
  nod-decoder-comparison:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 720

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry env use python
          poetry install

      - name: Prepare run manifest
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $dataRoot = "${{ inputs.data_root }}"
          if (-not [System.IO.Path]::IsPathRooted($dataRoot)) {
            $dataRoot = Join-Path $env:GITHUB_WORKSPACE $dataRoot
          }
          $dataRoot = [System.IO.Path]::GetFullPath($dataRoot)
          if (-not (Test-Path -LiteralPath $dataRoot)) {
            throw "Data root does not exist: $dataRoot"
          }

          $outputDir = Join-Path $env:GITHUB_WORKSPACE "${{ inputs.output_dir }}"
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null
          $runManifest = Join-Path $outputDir "manifest.csv"

          Import-Csv benchmarks/nod_animate_decoders_all.csv | ForEach-Object {
            $_.epochs = Join-Path $dataRoot (Split-Path $_.epochs -Leaf)
            $_.events_csv = Join-Path $dataRoot (Split-Path $_.events_csv -Leaf)
            $_
          } | Export-Csv -NoTypeInformation -Path $runManifest

          "REPTRACE_DATA_ROOT=$dataRoot" >> $env:GITHUB_ENV
          "REPTRACE_OUTPUT_DIR=$outputDir" >> $env:GITHUB_ENV
          "REPTRACE_RUN_MANIFEST=$runManifest" >> $env:GITHUB_ENV
          Write-Host "Using data root: $dataRoot"
          Write-Host "Wrote run manifest: $runManifest"

      - name: Validate staged data
        shell: pwsh
        run: |
          poetry run python -m reptrace.validate_manifest `
            "$env:REPTRACE_RUN_MANIFEST" `
            --report-out "$env:REPTRACE_OUTPUT_DIR/validation.csv"

      - name: Run all-subject decoder comparison
        shell: pwsh
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          poetry run python -m reptrace.benchmark `
            "$env:REPTRACE_RUN_MANIFEST" `
            --out-dir "$env:REPTRACE_OUTPUT_DIR" `
            --aggregate-out "$env:REPTRACE_OUTPUT_DIR/summary.csv" `
            --plot-out "$env:REPTRACE_OUTPUT_DIR/summary.png" `
            --calibration-dir "$env:REPTRACE_OUTPUT_DIR/calibration" `
            --chance 0.5

      - name: Generate reports and inference tables
        shell: pwsh
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          $ErrorActionPreference = "Stop"
          poetry run python -m reptrace.report `
            "$env:REPTRACE_OUTPUT_DIR/summary.csv" `
            "$env:REPTRACE_OUTPUT_DIR/sub-*_time_decode.csv" `
            --out "$env:REPTRACE_OUTPUT_DIR/report.md" `
            --chance 0.5

          poetry run python -m reptrace.calibration `
            "$env:REPTRACE_OUTPUT_DIR/summary.csv" `
            "$env:REPTRACE_OUTPUT_DIR/calibration/*_calibration_bins.csv" `
            --out-report "$env:REPTRACE_OUTPUT_DIR/calibration_report.md" `
            --out-bins "$env:REPTRACE_OUTPUT_DIR/reliability_bins.csv"

          foreach ($decoder in @("logistic", "lda", "linear_svm")) {
            $pattern = Join-Path $env:REPTRACE_OUTPUT_DIR ("sub-*_" + $decoder + "_time_decode.csv")
            poetry run python -m reptrace.inference `
              "$pattern" `
              --chance 0.5 `
              --n-permutations "${{ inputs.n_permutations }}" `
              --out-time "$env:REPTRACE_OUTPUT_DIR/inference_${decoder}_time.csv" `
              --out-clusters "$env:REPTRACE_OUTPUT_DIR/inference_${decoder}_clusters.csv"
          }

      - name: Upload compact result artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: nod-animate-decoders-all-${{ github.run_id }}
          path: |
            ${{ inputs.output_dir }}/validation.csv
            ${{ inputs.output_dir }}/manifest.csv
            ${{ inputs.output_dir }}/summary.csv
            ${{ inputs.output_dir }}/summary.png
            ${{ inputs.output_dir }}/report.md
            ${{ inputs.output_dir }}/calibration_report.md
            ${{ inputs.output_dir }}/reliability_bins.csv
            ${{ inputs.output_dir }}/inference_*_time.csv
            ${{ inputs.output_dir }}/inference_*_clusters.csv
          if-no-files-found: error
