name: NOD decoder comparison

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      data_root:
        description: "Directory containing sub-*_epo.fif and sub-*_events.csv files"
        required: true
        default: "../data/nod"
      data_remote_path:
        description: "Optional path below the NODEEG WebDAV share root when data_root is absent"
        required: false
        default: ""
      output_dir:
        description: "Repository-relative output directory for derived results"
        required: true
        default: "results/nod_animate_decoders_all"
      n_permutations:
        description: "Sign-flip permutations for temporal inference"
        required: true
        default: "10000"
      python_version:
        description: "Python version for the local py launcher"
        required: true
        default: "3.12"

concurrency:
  group: nod-decoder-comparison-${{ github.ref }}
  cancel-in-progress: false

jobs:
  nod-decoder-comparison:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 720
    env:
      NODEEG_WEBDAV_URL: ${{ secrets.NODEEG_WEBDAV_URL }}
      NODEEG_DATA_KEY: ${{ secrets.NODEEG_DATA_KEY }}
      NODEEG_DATA_PASSWORD: ${{ secrets.NODEEG_DATA_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install dependencies
        shell: cmd
        run: |
          py -${{ inputs.python_version }} --version
          py -${{ inputs.python_version }} -m pip install --upgrade pip
          py -${{ inputs.python_version }} -m pip install poetry
          for /f "delims=" %%P in ('py -${{ inputs.python_version }} -c "import sys; print(sys.executable)"') do set "PYTHON_EXE=%%P"
          py -${{ inputs.python_version }} -m poetry env use "%PYTHON_EXE%"
          py -${{ inputs.python_version }} -m poetry install

      - name: Install rclone
        if: env.NODEEG_WEBDAV_URL != ''
        shell: pwsh
        run: .github/scripts/install-rclone.ps1

      - name: Prepare run manifest
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $requestedDataRoot = "${{ inputs.data_root }}"
          $candidates = @($requestedDataRoot)
          if (-not [System.IO.Path]::IsPathRooted($requestedDataRoot)) {
            $candidates += (Join-Path $env:GITHUB_WORKSPACE $requestedDataRoot)
          }
          $dataRoot = $null
          foreach ($candidate in $candidates) {
            if ([string]::IsNullOrWhiteSpace($candidate)) {
              continue
            }
            if ((Test-Path (Join-Path $candidate "sub-01_epo.fif")) -and (Test-Path (Join-Path $candidate "sub-01_events.csv"))) {
              $dataRoot = (Resolve-Path $candidate).Path
              break
            }
          }
          if (-not $dataRoot) {
            if ([string]::IsNullOrWhiteSpace($env:NODEEG_WEBDAV_URL) -or [string]::IsNullOrWhiteSpace($env:NODEEG_DATA_KEY) -or [string]::IsNullOrWhiteSpace($env:NODEEG_DATA_PASSWORD)) {
              throw "No staged NOD-EEG data root found and NODEEG WebDAV secrets are not configured."
            }
            $dataRoot = Join-Path $env:GITHUB_WORKSPACE "data\nod"
            & py "-${{ inputs.python_version }}" scripts\download_nodeeg_data.py --data-root $dataRoot --remote-path "${{ inputs.data_remote_path }}" --require-subject-count 19
            $dataRoot = (Resolve-Path $dataRoot).Path
          }
          $outputDir = Join-Path $env:GITHUB_WORKSPACE "${{ inputs.output_dir }}"
          $runManifest = Join-Path $outputDir "manifest.csv"
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null
          & py "-${{ inputs.python_version }}" -m poetry run python scripts\prepare_benchmark_manifest.py benchmarks\nod_animate_decoders_all.csv $runManifest --data-root $dataRoot
          "REPTRACE_DATA_ROOT=$dataRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "REPTRACE_OUTPUT_DIR=$outputDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "REPTRACE_RUN_MANIFEST=$runManifest" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "Using data root: $dataRoot"
          "Wrote run manifest: $runManifest"

      - name: Validate staged data
        shell: cmd
        run: |
          set "PYTHONPATH=%GITHUB_WORKSPACE%\src"
          py -${{ inputs.python_version }} -m poetry run python -m reptrace.validate_manifest "%REPTRACE_RUN_MANIFEST%" --report-out "%REPTRACE_OUTPUT_DIR%\validation.csv"

      - name: Run all-subject decoder comparison
        shell: cmd
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          py -${{ inputs.python_version }} -m poetry run python -m reptrace.benchmark "%REPTRACE_RUN_MANIFEST%" --out-dir "%REPTRACE_OUTPUT_DIR%" --aggregate-out "%REPTRACE_OUTPUT_DIR%\summary.csv" --plot-out "%REPTRACE_OUTPUT_DIR%\summary.png" --calibration-dir "%REPTRACE_OUTPUT_DIR%\calibration" --chance 0.5 --resume

      - name: Generate reports and inference tables
        shell: cmd
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          py -${{ inputs.python_version }} -m poetry run python -m reptrace.report "%REPTRACE_OUTPUT_DIR%\summary.csv" "%REPTRACE_OUTPUT_DIR%\sub-*_time_decode.csv" --out "%REPTRACE_OUTPUT_DIR%\report.md" --chance 0.5
          py -${{ inputs.python_version }} -m poetry run python -m reptrace.calibration "%REPTRACE_OUTPUT_DIR%\summary.csv" "%REPTRACE_OUTPUT_DIR%\calibration\*_calibration_bins.csv" --out-report "%REPTRACE_OUTPUT_DIR%\calibration_report.md" --out-bins "%REPTRACE_OUTPUT_DIR%\reliability_bins.csv"
          py -${{ inputs.python_version }} -m poetry run python -m reptrace.plot_calibration "%REPTRACE_OUTPUT_DIR%\reliability_bins.csv" --out "%REPTRACE_OUTPUT_DIR%\reliability.png" --time-window 0.1 0.8 --title "NOD animate/inanimate decoder calibration"
          py -${{ inputs.python_version }} -m poetry run python -m reptrace.paired_stats "%REPTRACE_OUTPUT_DIR%\sub-*_time_decode.csv" --out-csv "%REPTRACE_OUTPUT_DIR%\paired_stats.csv" --out-report "%REPTRACE_OUTPUT_DIR%\paired_stats.md" --chance 0.5 --n-permutations "${{ inputs.n_permutations }}"
          for %%D in (logistic lda linear_svm) do (
            py -${{ inputs.python_version }} -m poetry run python -m reptrace.inference "%REPTRACE_OUTPUT_DIR%\sub-*_%%D_time_decode.csv" --chance 0.5 --n-permutations "${{ inputs.n_permutations }}" --out-time "%REPTRACE_OUTPUT_DIR%\inference_%%D_time.csv" --out-clusters "%REPTRACE_OUTPUT_DIR%\inference_%%D_clusters.csv"
          )

      - name: Upload compact result artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: nod-animate-decoders-all-${{ github.run_id }}
          path: |
            ${{ inputs.output_dir }}/validation.csv
            ${{ inputs.output_dir }}/manifest.csv
            ${{ inputs.output_dir }}/summary.csv
            ${{ inputs.output_dir }}/summary.png
            ${{ inputs.output_dir }}/reliability.png
            ${{ inputs.output_dir }}/report.md
            ${{ inputs.output_dir }}/calibration_report.md
            ${{ inputs.output_dir }}/paired_stats.csv
            ${{ inputs.output_dir }}/paired_stats.md
            ${{ inputs.output_dir }}/reliability_bins.csv
            ${{ inputs.output_dir }}/inference_*_time.csv
            ${{ inputs.output_dir }}/inference_*_clusters.csv
          if-no-files-found: warn
