site_name: RepTrace
site_description: Probabilistic tracing of neural representations over time
repo_url: https://github.com/FlorianPfaff/RepTrace
repo_name: FlorianPfaff/RepTrace

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Data Staging: data-staging.md
  - Benchmarking: benchmarking.md
  - API Overview: api-overview.md
  - Reference:
      - Benchmark: reference/benchmark.md
      - Calibration: reference/calibration.md
      - Decoding: reference/decoding.md
      - Emission Compare: reference/emission-compare.md
      - Inference: reference/inference.md
      - Metadata: reference/metadata.md
      - Metrics: reference/metrics.md
      - Onset Detection: reference/onset-detection.md
      - Onset Workflow: reference/onset-workflow.md
      - Onset Sensitivity: reference/onset-sensitivity.md
      - Paired Statistics: reference/paired-stats.md
      - Paper 2 Workflow: reference/paper2-workflow.md
      - Results: reference/results.md
      - Semantic Stages: reference/semantic-stages.md
      - Temporal Generalization: reference/temporal-generalization.md
      - Temporal Model: reference/temporal-model.md
      - Time-Resolved Decoding: reference/time-resolved-decoding.md

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
